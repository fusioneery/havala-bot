# =============================================================================
# Railway Configuration
# =============================================================================
# Railway automatically detects Dockerfile and uses it for builds.
# This file provides additional configuration for optimal deployment.
#
# Docs: https://docs.railway.app/reference/config-as-code
# =============================================================================

[build]
# Use Dockerfile for builds (Railway auto-detects this)
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# Watch paths for rebuilds
watchPatterns = [
  "packages/**",
  "package.json",
  "bun.lock",
  "Dockerfile"
]

[deploy]
# Number of replicas (1 for stateful SQLite app)
numReplicas = 1

# Health check configuration
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Graceful shutdown
sleepApplication = false
