# =============================================================================
# Railway Configuration
# =============================================================================
# Railway automatically detects Dockerfile and uses it for builds.
# This file provides additional configuration for optimal deployment.
#
# Docs: https://docs.railway.app/reference/config-as-code
# =============================================================================

[build]
# Use Dockerfile for builds (Railway auto-detects this)
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# Watch paths for rebuilds
watchPatterns = [
  "packages/**",
  "package.json",
  "bun.lock",
  "Dockerfile"
]

[deploy]
# Override service-level npm startCommand — Railway dashboard default uses npm which isn't in bun:1-slim
# Entrypoint fixes volume permissions and drops privileges to hawala user via gosu
startCommand = "/app/entrypoint.sh bun packages/bot/src/index.ts"

# Number of replicas (1 for stateful SQLite app)
numReplicas = 1

# Health check configuration
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Graceful shutdown
sleepApplication = false
